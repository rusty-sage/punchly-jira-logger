<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Punchly Reporter</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 0;
        padding: 14px 16px;
        min-width: 260px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
        color: #1a1a1a;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
      }
      input:focus {
        outline: none;
        border-color: #1fba5f;
        box-shadow: 0 0 0 2px rgba(31, 186, 95, 0.2);
      }
      button {
        margin-top: 12px;
        width: 100%;
        padding: 10px 14px;
        background: #1fba5f;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(0.95);
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #1fba5f;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <form id="form">
      <label for="userName">Your Name</label>
      <input type="text" id="userName" name="userName" autocomplete="name" placeholder="Jane Doe" />
      <button type="submit">Save</button>
      <div id="status" aria-live="polite"></div>
    </form>
    <script src="popup.js"></script>
  </body>
</html>
